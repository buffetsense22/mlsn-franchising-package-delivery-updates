<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLSN Delivery System</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f3f4f6;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:70px;
background:#111;
color:white;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
}
.sidebar div{
margin:20px 0;
font-size:20px;
}

/* MAIN */
.main{
flex:2;
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* PACKAGE LIST */
.package{
padding:10px;
border-bottom:1px solid #eee;
}

/* STATUS */
.status{
padding:4px 10px;
border-radius:10px;
font-size:12px;
}
.pending{background:#ddd;}
.transit{background:#60a5fa;color:white;}
.delivered{background:#22c55e;color:white;}

/* MAP */
.map{
flex:1;
background:#e5e7eb;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

/* FORM */
input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:#7c3aed;
color:white;
}

/* LOGIN */
#login{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:#111;
color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div>
<h2>MLSN Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<div>🏠</div>
<div>📦</div>
<div>⚙️</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h2>MLSN Dashboard</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>Add Package</h3>
<input id="name" placeholder="Franchisee">
<input id="location" placeholder="Location">
<input id="date" type="date">
<button onclick="add()">Add</button>
</div>

<div class="card">
<h3>Packages</h3>
<div id="list"></div>
</div>

</div>

<!-- MAP -->
<div class="map">
🗺️ MAP VIEW (Tracking Preview)
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCM6S_RNVOx5Ru2qEt5jjM4TP2GMOgtfKk",
authDomain:"mlsn-system-ce163.firebaseapp.com",
projectId:"mlsn-system-ce163"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

// LOGIN
function login(){
auth.signInWithEmailAndPassword(
email.value,password.value
).then(()=>{
login.style.display="none";
});
}

// LOGOUT
function logout(){location.reload();}

// ADD DATA
function add(){
db.collection("requests").add({
name:name.value,
location:location.value,
date:date.value,
status:"Pending",
created:firebase.firestore.FieldValue.serverTimestamp()
});
}

// REALTIME
db.collection("requests").orderBy("created","desc")
.onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
let d=doc.data();

html+=`
<div class="package">
<b>${d.name}</b><br>
${d.location}<br>
${d.date || ""}<br>

<select onchange="update('${doc.id}',this.value)">
<option ${d.status=="Pending"?"selected":""}>Pending</option>
<option ${d.status=="Transit"?"selected":""}>Transit</option>
<option ${d.status=="Delivered"?"selected":""}>Delivered</option>
</select>

<span class="status ${d.status.toLowerCase()}">${d.status}</span>
</div>
`;
});
list.innerHTML=html;
});

// UPDATE STATUS
function update(id,status){
db.collection("requests").doc(id).update({status});
}
</script>

</body>
</html>
