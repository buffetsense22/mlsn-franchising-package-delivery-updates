<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLSN System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{font-family:Segoe UI;margin:0;background:#f3f4f6;}
.card{background:white;padding:15px;border-radius:12px;margin:15px;}
.btn{background:#6d28d9;color:white;padding:10px;border:none;border-radius:8px;width:100%;}
input{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ccc;}
.header{background:#6d28d9;color:white;padding:15px;}
</style>
</head>

<body>

<div id="login">
<div class="card">
<h3>Login</h3>
<input id="email">
<input id="password" type="password">
<button class="btn" onclick="loginUser()">Login</button>
</div>
</div>

<div id="app" style="display:none">

<div class="header">Dashboard</div>

<div class="card">
<h4>Add Request</h4>
<input id="name">
<button class="btn" onclick="addData()">Submit</button>
</div>

<div class="card">
<table id="table"></table>
</div>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCM6S_RNVOx5Ru2qEt5jjM4TP2GMOgtfKk",
authDomain:"mlsn-system-ce163.firebaseapp.com",
projectId:"mlsn-system-ce163"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

function loginUser(){
const email=document.getElementById("email").value;
const pass=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,pass)
.then(()=>{
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
})
.catch(e=>alert(e.message));
}

function addData(){
db.collection("requests").add({
name:document.getElementById("name").value,
created:new Date()
});
}

db.collection("requests").onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
let d=doc.data();
html+=`<tr><td>${d.name}</td></tr>`;
});
document.getElementById("table").innerHTML=html;
});
</script>

</body>
</html>
