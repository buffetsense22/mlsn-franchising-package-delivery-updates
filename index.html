<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLSN FUTURE SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:linear-gradient(to bottom,#020617,#0f172a);
color:white;
}

/* HERO */
.hero{
height:260px;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
align-items:center;
justify-content:space-between;
padding:25px;
}

.hero h1{
font-size:28px;
letter-spacing:2px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

/* CARD */
.item{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:15px;
padding:15px;
text-align:center;
transition:0.3s;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.item:hover{
transform:scale(1.05);
}

/* STATUS */
.status{
display:inline-block;
margin-top:10px;
padding:5px 10px;
border-radius:10px;
font-size:12px;
}
.pending{background:#64748b;}
.released{background:#22c55e;}
.delayed{background:#ef4444;}

/* BUTTON */
.btn{
background:#7c3aed;
padding:10px;
border:none;
border-radius:10px;
color:white;
margin-top:10px;
width:100%;
}

/* LOGIN */
#login{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-card{
background:#1e293b;
padding:25px;
border-radius:20px;
width:280px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}

/* CHART */
canvas{
margin:15px;
}

/* FORM */
.form{
padding:15px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-card">
<h3>MLSN LOGIN</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="loginUser()">LOGIN</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="hero">
<h1>MLSN SYSTEM</h1>
<button class="btn" onclick="logout()">LOGOUT</button>
</div>

<canvas id="chart"></canvas>

<div class="form">
<input id="name" placeholder="Franchisee Name">
<input id="loc" placeholder="Location">
<button class="btn" onclick="addData()">ADD PACKAGE</button>
</div>

<div id="grid" class="grid"></div>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCM6S_RNVOx5Ru2qEt5jjM4TP2GMOgtfKk",
authDomain:"mlsn-system-ce163.firebaseapp.com",
projectId:"mlsn-system-ce163"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let chart;

// LOGIN
function loginUser(){
auth.signInWithEmailAndPassword(
document.getElementById("email").value,
document.getElementById("password").value
)
.then(()=>{
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
})
.catch(e=>alert(e.message));
}

// LOGOUT
function logout(){
location.reload();
}

// ADD DATA
function addData(){
db.collection("requests").add({
name:document.getElementById("name").value,
location:document.getElementById("loc").value,
status:"Pending",
created:new Date()
});
}

// REALTIME DISPLAY
db.collection("requests").orderBy("created","desc")
.onSnapshot(snap=>{
let html="";
let p=0,r=0,d=0;

snap.forEach(doc=>{
let x=doc.data();

if(x.status==="Pending")p++;
if(x.status==="Released")r++;
if(x.status==="Delayed")d++;

html+=`
<div class="item">
<h3>${x.name}</h3>
<p>${x.location||""}</p>

<select onchange="updateStatus('${doc.id}',this.value)">
<option ${x.status==="Pending"?"selected":""}>Pending</option>
<option ${x.status==="Released"?"selected":""}>Released</option>
<option ${x.status==="Delayed"?"selected":""}>Delayed</option>
</select>

<div class="status ${x.status.toLowerCase()}">${x.status}</div>
</div>
`;
});

document.getElementById("grid").innerHTML=html;

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"doughnut",
data:{
labels:["Pending","Released","Delayed"],
datasets:[{data:[p,r,d]}]
}
});

});

// UPDATE STATUS
function updateStatus(id,status){
db.collection("requests").doc(id).update({status});
}
</script>

</body>
</html>
