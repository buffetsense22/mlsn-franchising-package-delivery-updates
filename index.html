
<!DOCTYPE html>


<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLSN System</title>


<style>
body{margin:0;font-family:Arial;background:#fff;}
.header{background:#6d28d9;color:#fff;padding:15px;font-weight:bold;}
.container{padding:15px;}
.card{background:#f3f4f6;padding:15px;border-radius:10px;margin-bottom:15px;}
.btn{background:#6d28d9;color:white;padding:10px;border:none;width:100%;border-radius:8px;margin-top:10px;}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:5px;border:1px solid #ccc;}
table{width:100%;border-collapse:collapse;}
th{background:#ede9fe;padding:10px;}
td{padding:10px;border-bottom:1px solid #ddd;}
.badge{padding:5px 10px;border-radius:6px;color:white;font-size:12px;}
.pending{background:#6b7280;}
.released{background:#22c55e;}
.delayed{background:#ef4444;}
</style>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>


</head>


<body>


<div id="login" class="container">
<div class="card">
<h3>🔐 Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>
</div>


<div id="app" style="display:none">


<div class="header">
MLSN System
<button onclick="logout()" style="float:right;background:white;color:#6d28d9;border:none;padding:5px 10px;border-radius:5px;">Logout</button>
</div>


<div class="container">


<div class="card">
<b>📊 Dashboard</b><br><br>
Total: <span id="total">0</span><br>
Pending: <span id="pendingCount">0</span><br>
Released: <span id="releasedCount">0</span><br>
Delayed: <span id="delayedCount">0</span>
</div>


<div id="form" class="card">
<b>📦 Request Package</b>
<input id="name" placeholder="Name">
<input id="loc" placeholder="Location">
<input id="date" type="date">
<button class="btn" onclick="addData()">Submit</button>
</div>


<div class="card">
<b>📋 Requests</b>
<table>
<tr>
<th>Name</th>
<th>Location</th>
<th>Date</th>
<th>Status</th>
</tr>
<tbody id="table"></tbody>
</table>
</div>


</div>
</div>


<script>
const firebaseConfig={
apiKey:"AIzaSyCM6S_RNVOx5Ru2qEt5jjM4TP2GMOgtfKk",
authDomain:"mlsn-system-ce163.firebaseapp.com",
projectId:"mlsn-system-ce163"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let role="";

function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,pass)
.then(()=>{
detectRole(email);
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
})
.catch(()=>alert("Login failed"));
}

function logout(){
auth.signOut();
location.reload();
}

function detectRole(email){
if(email.includes("admin")) role="admin";
else if(email.includes("release")) role="releasing";
else role="supervisor";

if(role!=="admin"){
document.getElementById("form").style.display="none";
}
}

function addData(){
db.collection("requests").add({
name:document.getElementById("name").value,
location:document.getElementById("loc").value,
date:document.getElementById("date").value,
status:"Pending",
created:new Date()
});
}

db.collection("requests").orderBy("created","desc")
.onSnapshot(snap=>{
let html="";
let total=0,pending=0,released=0,delayed=0;

snap.forEach(doc=>{
let d=doc.data();
total++;

if(d.status==="Pending") pending++;
if(d.status==="Released") released++;
if(d.status==="Delayed") delayed++;

let badge="pending";
if(d.status==="Released") badge="released";
if(d.status==="Delayed") badge="delayed";

let statusUI="";

if(role==="releasing"){
statusUI=`
<select onchange="updateStatus('${doc.id}',this.value)">
<option ${d.status==="Pending"?"selected":""}>Pending</option>
<option ${d.status==="Released"?"selected":""}>Released</option>
<option ${d.status==="Delayed"?"selected":""}>Delayed</option>
</select>`;
}else{
statusUI=`<span class="badge ${badge}">${d.status}</span>`;
}

html+=`
<tr>
<td>${d.name}</td>
<td>${d.location}</td>
<td>${d.date}</td>
<td>${statusUI}</td>
</tr>`;
});

document.getElementById("table").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("pendingCount").innerText=pending;
document.getElementById("releasedCount").innerText=released;
document.getElementById("delayedCount").innerText=delayed;
});

function updateStatus(id,status){
db.collection("requests").doc(id).update({status:status});
}
</script>


</body>
</html>
