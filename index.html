<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLSN Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
}

/* PURPLE HEADER /
.header {
    background: #6d28d9;
    color: white;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
}

/ CONTENT /
.container {
    padding: 15px;
}

/ CARD /
.card {
    background: #f3f4f6;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

/ BUTTON /
.btn {
    background: #6d28d9;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    width: 100%;
    font-size: 14px;
    margin-bottom: 15px;
}

/ TABLE /
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #ede9fe;
    padding: 10px;
    text-align: left;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

/ STATUS COLORS /
.badge {
    padding: 5px 10px;
    border-radius: 6px;
    color: white;
    font-size: 12px;
}

.green { background: #22c55e; }
.orange { background: #f59e0b; }
.gray { background: #6b7280; }

/ FORM */
input {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
MLSN Franchising Solution Corp.
</div>

<div class="container">

<!-- DASHBOARD -->
<div class="card">
<b>📊 Dashboard</b><br><br>
Total Releases: 12<br>
Tomorrow: 3
</div>

<!-- BUTTON -->
<button class="btn">➕ Request Package</button>

<!-- TABLE -->
<div class="card">
<b>📦 Release Table</b>

<table>
<tr>
<th>Name</th>
<th>Location</th>
<th>Status</th>
</tr>

<tr>
<td>Juan Dela Cruz</td>
<td>Manila</td>
<td><span class="badge green">Today</span></td>
</tr>

<tr>
<td>Maria Santos</td>
<td>Baguio</td>
<td><span class="badge orange">Tomorrow</span></td>
</tr>

<tr>
<td>Pedro Reyes</td>
<td>Cebu</td>
<td><span class="badge gray">Pending</span></td>
</tr>

</table>
</div>

<!-- FORM -->
<div class="card">
<b>📦 Request Package</b>

<input type="text" placeholder="Franchisee Name">
<input type="text" placeholder="Location">
<input type="date">

<button class="btn">Submit Request</button>
</div>

</div>

</body>
</html>
