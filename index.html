<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLSN Ultimate App</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
:root{--bg:#f8fafc;--card:#fff;--text:#111;--primary:#6d28d9;}
.dark{--bg:#0f172a;--card:#1e293b;--text:#fff;}

body{margin:0;font-family:Segoe UI;background:var(--bg);color:var(--text);}

/* HEADER */
.header{
background:var(--primary);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

/* SIDEBAR */
.sidebar{
position:fixed;
width:200px;
height:100%;
background:var(--primary);
color:white;
padding:15px;
}
.sidebar button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#8b5cf6;
color:white;
}

/* MAIN */
.main{
margin-left:210px;
padding:15px;
}

/* CARD */
.card{
background:var(--card);
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}
.stat{
text-align:center;
padding:10px;
border-radius:10px;
background:var(--card);
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
}

/* BUTTON */
.btn{
background:var(--primary);
color:white;
padding:10px;
border:none;
border-radius:8px;
width:100%;
margin-top:10px;
}

/* TABLE */
td{
padding:10px;
border-bottom:1px solid #ddd;
}

/* BADGE */
.badge{padding:5px 10px;border-radius:8px;color:white;}
.pending{background:#6b7280;}
.released{background:#22c55e;}
.delayed{background:#ef4444;}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
right:20px;
background:var(--primary);
color:white;
padding:10px;
border-radius:10px;
display:none;
}

/* MOBILE */
@media(max-width:768px){
.sidebar{display:none;}
.main{margin:0;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" style="padding:20px;">
<div class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="loginUser()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="header">
MLSN App
<div>
<button onclick="toggleDark()">🌙</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="sidebar">
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('requests')">Requests</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<div class="grid">
<div class="stat">Total<br><b id="total"></b></div>
<div class="stat">Pending<br><b id="pending"></b></div>
<div class="stat">Released<br><b id="released"></b></div>
<div class="stat">Delayed<br><b id="delayed"></b></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>
</div>

<!-- REQUESTS -->
<div id="requests" style="display:none">

<div id="form" class="card">
<input id="name" placeholder="Name">
<input id="loc" placeholder="Location">
<input id="date" type="date">
<button class="btn" onclick="addData()">Add</button>
</div>

<div class="card">
<table id="table"></table>
</div>

</div>

</div>
</div>

<div id="toast" class="toast"></div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCM6S_RNVOx5Ru2qEt5jjM4TP2GMOgtfKk",
authDomain:"mlsn-system-ce163.firebaseapp.com",
projectId:"mlsn-system-ce163"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let role="";

// ✅ FIXED LOGIN FUNCTION
function loginUser(){
const emailVal=document.getElementById("email").value;
const passVal=document.getElementById("password").value;

auth.signInWithEmailAndPassword(emailVal,passVal)
.then(()=>{

if(emailVal.includes("admin")) role="admin";
else if(emailVal.includes("release")) role="releasing";
else role="supervisor";

if(role!=="admin"){
document.getElementById("form").style.display="none";
}

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

})
.catch(e=>alert(e.message));
}

// LOGOUT
function logout(){
location.reload();
}

// DARK MODE
function toggleDark(){
document.body.classList.toggle("dark");
}

// ADD DATA
function addData(){
db.collection("requests").add({
name:document.getElementById("name").value,
location:document.getElementById("loc").value,
date:document.getElementById("date").value,
status:"Pending",
created:new Date()
});
toast("Added");
}

// REALTIME
db.collection("requests").orderBy("created","desc")
.onSnapshot(snap=>{
let html="",t=0,p=0,r=0,d=0;

snap.forEach(doc=>{
let x=doc.data();
t++;

if(x.status==="Pending")p++;
if(x.status==="Released")r++;
if(x.status==="Delayed")d++;

let badge=`<span class="badge ${x.status.toLowerCase()}">${x.status}</span>`;

if(role==="releasing"){
badge=`<select onchange="update('${doc.id}',this.value)">
<option ${x.status==="Pending"?"selected":""}>Pending</option>
<option ${x.status==="Released"?"selected":""}>Released</option>
<option ${x.status==="Delayed"?"selected":""}>Delayed</option>
</select>`;
}

html+=`<tr><td>${x.name}</td><td>${badge}</td></tr>`;
});

document.getElementById("table").innerHTML=html;

document.getElementById("total").innerText=t;
document.getElementById("pending").innerText=p;
document.getElementById("released").innerText=r;
document.getElementById("delayed").innerText=d;

// FIX chart re-render bug
if(window.myChart) window.myChart.destroy();

window.myChart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Pending","Released","Delayed"],
datasets:[{data:[p,r,d]}]
}
});

});

// UPDATE STATUS
function update(id,status){
db.collection("requests").doc(id).update({status});
toast("Updated");
}

// NAV
function showPage(p){
document.getElementById("dashboard").style.display="none";
document.getElementById("requests").style.display="none";
document.getElementById(p).style.display="block";
}

// TOAST
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

// SERVICE WORKER
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
