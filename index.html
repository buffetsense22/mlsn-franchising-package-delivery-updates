<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLSN Dashboard</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
}

/* HEADER /
.header {
    background: #7c3aed;
    color: white;
    padding: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.header img {
    height: 40px;
}

.header h1 {
    font-size: 18px;
    margin: 0;
}

/ CONTENT /
.container {
    padding: 15px;
}

/ CARD /
.card {
    background: #f3f4f6;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

/ BUTTON /
.btn {
    background: #7c3aed;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    width: 100%;
    font-size: 14px;
    margin-bottom: 15px;
}

/ TABLE /
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    padding: 10px;
    background: #ede9fe;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

/ BADGES /
.badge {
    padding: 5px 10px;
    border-radius: 6px;
    color: white;
    font-size: 12px;
}

.green { background: #22c55e; }
.orange { background: #f59e0b; }
.gray { background: #6b7280; }

/ MODAL /
.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
}

.modal-content {
    background: white;
    margin: 60px auto;
    padding: 20px;
    width: 90%;
    max-width: 400px;
    border-radius: 10px;
}

/ INPUT */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}
</style>

<script>
function openForm(){
    document.getElementById("modal").style.display="block";
}
function closeForm(){
    document.getElementById("modal").style.display="none";
}
</script>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>MLSN Franchising Solution Corp.</h1>
</div>

<!-- CONTENT -->
<div class="container">

    <div class="card">
        <strong>📊 Dashboard</strong><br><br>
        Total Releases: 12<br>
        Tomorrow: 3
    </div>

    <button class="btn" onclick="openForm()">➕ Request Package</button>

    <div class="card">
        <strong>📦 Release Table</strong>

        <table>
            <tr>
                <th>Name</th>
                <th>Location</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>Juan Dela Cruz</td>
                <td>Manila</td>
                <td><span class="badge green">Today</span></td>
            </tr>

            <tr>
                <td>Maria Santos</td>
                <td>Baguio</td>
                <td><span class="badge orange">Tomorrow</span></td>
            </tr>

            <tr>
                <td>Pedro Reyes</td>
                <td>Cebu</td>
                <td><span class="badge gray">Pending</span></td>
            </tr>
        </table>

    </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3>📦 Request Package</h3>

        <input type="text" placeholder="Franchisee Name">
        <input type="text" placeholder="Location">
        <input type="date">

        <button class="btn">Submit</button>
        <button onclick="closeForm()">Cancel</button>
    </div>
</div>

</body>
</html>
