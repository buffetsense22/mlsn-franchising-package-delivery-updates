<!DOCTYPE html>
<html>
<head>
<title>MLSN Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #0b0b0f;
    color: #fff;
    padding: 15px;
}

.header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}

.logo {
    height: 50px;
}

h1 {
    font-size: 18px;
    color: #c084fc;
    margin: 0;
}

.tagline {
    font-size: 12px;
    color: #aaa;
}

.card {
    background: #1e1e1e;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
}

table {
    width: 100%;
}

td {
    padding: 8px;
    border-bottom: 1px solid #333;
}

.badge {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
}

.green { background:#4CAF50; }
.orange { background:orange; }
.gray { background:#555; }
</style>
</head>

<body>

<div class="header">
    <img src="logo.png" class="logo">
    <div>
        <h1>MLSN Franchising Solution Corp.</h1>
        <div class="tagline">"Your PLAN, Our GOAL"</div>
    </div>
</div>

<div class="card">
📊 Total Releases: 12<br>
⚠️ Tomorrow: 3
</div>

<div class="card">
<h3>📊 Analytics</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>📋 Releases</h3>
<table>
<tr>
<td>John Doe</td>
<td>Manila</td>
<td><span class="badge green">Today</span></td>
</tr>
<tr>
<td>Jane Smith</td>
<td>Baguio</td>
<td><span class="badge orange">Tomorrow</span></td>
</tr>
<tr>
<td>Mark Lee</td>
<td>Cebu</td>
<td><span class="badge gray">Upcoming</span></td>
</tr>
</table>
</div>

<script>
new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: {
        labels: ['Today','Tomorrow','Pending','Released'],
        datasets: [{
            data: [5,3,4,6]
        }]
    }
});
</script>

</body>
</html>
