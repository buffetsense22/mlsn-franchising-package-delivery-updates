<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLSN Premium Dashboard</title>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
}

/* HEADER */
.header{
background:linear-gradient(90deg,#6d28d9,#9333ea);
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.header button{
background:white;
color:#6d28d9;
border:none;
padding:8px 15px;
border-radius:20px;
}

/* SIDEBAR */
.sidebar{
position:fixed;
width:220px;
height:100%;
background:linear-gradient(180deg,#6d28d9,#4c1d95);
color:white;
padding:20px;
}

.sidebar button{
width:100%;
margin-top:12px;
padding:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
font-weight:500;
}

/* MAIN */
.main{
margin-left:230px;
padding:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.stat{
text-align:center;
padding:20px;
border-radius:15px;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.stat b{
font-size:22px;
}

/* INPUT */
input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn{
background:linear-gradient(90deg,#6d28d9,#9333ea);
color:white;
padding:12px;
border:none;
border-radius:10px;
width:100%;
margin-top:10px;
font-weight:600;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

/* STATUS */
.badge{
padding:6px 12px;
border-radius:20px;
color:white;
font-size:12px;
}
.pending{background:#6b7280;}
.released{background:#22c55e;}
.delayed{background:#ef4444;}

/* LOGIN */
#login{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-card{
width:300px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* MOBILE */
@media(max-width:768px){
.sidebar{display:none;}
.main{margin:0;}
.grid{grid-template-columns:repeat(2,1fr);}
}
</style>


</head>


<body>


<!-- LOGIN -->


<div id="login">
<div class="login-card">
<h2>MLSN Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="loginUser()">Login</button>
</div>
</div>


<!-- APP -->


<div id="app" style="display:none">


<div class="header">
MLSN Premium Dashboard
<button onclick="logout()">Logout</button>
</div>


<div class="sidebar">
<h3>Menu</h3>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('requests')">Requests</button>
</div>


<div class="main">


<!-- DASHBOARD -->


<div id="dashboard">


<div class="grid">
<div class="stat">Total<br><b id="total">0</b></div>
<div class="stat">Pending<br><b id="pending">0</b></div>
<div class="stat">Released<br><b id="released">0</b></div>
<div class="stat">Delayed<br><b id="delayed">0</b></div>
</div>


<div class="card">
<canvas id="chart"></canvas>
</div>


</div>


<!-- REQUESTS -->


<div id="requests" style="display:none">


<div id="form" class="card">
<h3>Request Package</h3>
<input id="name" placeholder="Franchisee Name">
<input id="loc" placeholder="Location">
<input id="date" type="date">
<button class="btn" onclick="addData()">Submit</button>
</div>


<div class="card">
<table id="table"></table>
</div>


</div>


</div>
</div>


<script>
const firebaseConfig={
apiKey:"AIzaSyCM6S_RNVOx5Ru2qEt5jjM4TP2GMOgtfKk",
authDomain:"mlsn-system-ce163.firebaseapp.com",
projectId:"mlsn-system-ce163"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let role="";
let chart=null;

// LOGIN
function loginUser(){
const email=document.getElementById("email").value;
const pass=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,pass)
.then(()=>{
if(email.includes("admin")) role="admin";
else if(email.includes("release")) role="releasing";
else role="supervisor";

if(role!=="admin"){
document.getElementById("form").style.display="none";
}

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
})
.catch(e=>alert(e.message));
}

// LOGOUT
function logout(){location.reload();}

// ADD DATA
function addData(){
db.collection("requests").add({
name:document.getElementById("name").value,
location:document.getElementById("loc").value,
date:document.getElementById("date").value,
status:"Pending",
created:new Date()
});
}

// REALTIME
db.collection("requests").orderBy("created","desc")
.onSnapshot(snap=>{
let html="",t=0,p=0,r=0,d=0;

snap.forEach(doc=>{
let x=doc.data(); t++;

if(x.status==="Pending")p++;
if(x.status==="Released")r++;
if(x.status==="Delayed")d++;

let badge=`<span class="badge ${x.status.toLowerCase()}">${x.status}</span>`;

if(role==="releasing"){
badge=`<select onchange="update('${doc.id}',this.value)">
<option ${x.status==="Pending"?"selected":""}>Pending</option>
<option ${x.status==="Released"?"selected":""}>Released</option>
<option ${x.status==="Delayed"?"selected":""}>Delayed</option>
</select>`;
}

html+=`<tr><td>${x.name}</td><td>${badge}</td></tr>`;
});

document.getElementById("table").innerHTML=html;
document.getElementById("total").innerText=t;
document.getElementById("pending").innerText=p;
document.getElementById("released").innerText=r;
document.getElementById("delayed").innerText=d;

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"doughnut",
data:{
labels:["Pending","Released","Delayed"],
datasets:[{data:[p,r,d]}]
}
});
});

// UPDATE
function update(id,status){
db.collection("requests").doc(id).update({status});
}

// NAV
function showPage(p){
document.getElementById("dashboard").style.display="none";
document.getElementById("requests").style.display="none";
document.getElementById(p).style.display="block";
}
</script>


</body>
</html>
